<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>海淀区党群服务中心阵地地图</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --red:#C0281C;--red2:#a02015;
    --gold:#C8A84B;--gold-l:#E4C76B;--gold-d:#9A7B2C;
    --cream:#F5EFD6;--cream2:#EDE0B8;
    --ink:#2A1A0E;--ink2:#4A3020;
  }
  html,body{height:100%;overflow:hidden;background:var(--red)}
  #app{display:flex;flex-direction:column;height:100vh;background:var(--red);overflow:hidden}

  .page-header{flex-shrink:0;padding:12px 18px 8px;display:flex;justify-content:flex-end}
  .title-sub{font-size:clamp(11px,3vw,16px);color:rgba(255,255,255,.9);font-weight:600;letter-spacing:3px;text-shadow:1px 1px 4px rgba(0,0,0,.3)}
  .title-main{font-size:clamp(28px,9vw,54px);font-weight:900;color:#fff;letter-spacing:2px;line-height:1.1;text-shadow:2px 3px 8px rgba(0,0,0,.35);font-family:'STHupo','STXingkai','PingFang SC',sans-serif}

  .map-area{flex:1;overflow:hidden;padding:0 6px 4px}
  .map-scroll{width:100%;height:100%;overflow:auto;-webkit-overflow-scrolling:touch}
  .map-inner{width:100%;display:flex;justify-content:center}
  svg.district-map{width:100%;max-width:680px;height:auto;display:block;overflow:visible}

  .street-path{stroke:rgba(255,255,255,.65);stroke-width:1;stroke-linejoin:round;transition:filter .15s,opacity .15s}
  .street-path.clickable{cursor:pointer}
  .street-path.clickable:hover,.street-path.clickable:active{filter:brightness(1.1) drop-shadow(0 0 5px rgba(200,168,75,.5));opacity:.85}
  .street-path.no-info{cursor:default}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .18s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  .card{background:var(--cream);width:100%;max-width:390px;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4);border:1.5px solid var(--gold);animation:popIn .25s cubic-bezier(.34,1.4,.64,1);position:relative}
  @keyframes popIn{from{transform:scale(.86);opacity:0}to{transform:scale(1);opacity:1}}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold-d),var(--gold-l),var(--gold-d))}
  .card-header{background:var(--red);padding:16px 18px 14px;position:relative}
  .card-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold-l),transparent)}
  .card-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(200,168,75,.2);border:1px solid rgba(200,168,75,.5);color:var(--gold-l);font-size:10px;padding:2px 8px;border-radius:20px;margin-bottom:6px;letter-spacing:.5px}
  .card-name{font-size:clamp(14px,4vw,17px);font-weight:700;color:#fff;line-height:1.4;padding-right:36px}
  .card-close{position:absolute;top:13px;right:13px;width:28px;height:28px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:50%;color:rgba(255,255,255,.9);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .card-close:hover{background:rgba(255,255,255,.28)}
  .card-body{padding:4px 0 0}
  .info-row{display:flex;align-items:flex-start;gap:10px;padding:10px 18px;border-bottom:1px solid rgba(193,168,75,.2)}
  .info-row:last-child{border-bottom:none}
  .info-icon-wrap{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:rgba(192,40,28,.08)}
  .info-content{flex:1;min-width:0}
  .info-label{font-size:10px;color:var(--gold-d);font-weight:600;letter-spacing:1px;margin-bottom:2px}
  .info-value{font-size:13px;color:var(--ink);line-height:1.5;font-weight:500;word-break:break-all}
  .info-value.phone{color:var(--red);font-size:15px;font-weight:700;letter-spacing:1px}
  .card-footer{padding:12px 18px 16px}
  .btn-call{width:100%;background:var(--red);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:background .15s}
  .btn-call:hover{background:var(--red2)}
</style>
</head>
<body>
<div id="app">
  <div class="page-header">
    <div style="text-align:right">
      <div class="title-sub">海淀区党群服务中心</div>
      <div class="title-main">阵地地图</div>
    </div>
  </div>

  <div class="map-area">
    <div class="map-scroll">
      <div class="map-inner">
        <svg class="district-map" viewBox="0 0 1053 1084" xmlns="http://www.w3.org/2000/svg">

          <!-- 街道色块 -->
          <path v-for="s in streets" :key="s.id"
            :d="s.d" :fill="s.fill"
            :class="['street-path', s.hasInfo?'clickable':'no-info']"
            @click="s.hasInfo ? open(s.id) : null"
          />

          <!--
            标注方案：每个标注用 <g> 包裹，整体以区域中心 (cx,cy) 为锚点。
            在 <g> 内坐标系里：
              - 红星中心在 (-halfW - 5, 0)，halfW 是文字半宽估算
              - 文字从 (-halfW + 1, 0) 左端开始，text-anchor=start
            整体效果：★名字 居中于区域中心
            halfW = 字数 × fontSize × 0.5 × 0.6  (CJK字符约0.6em per char at SVG)
            实际按字号13px，每个CJK字约8px宽，估算：字数×8/2 = 字数×4
          -->
          <g v-for="lb in allLabels" :key="lb.id"
            :transform="`translate(${lb.cx},${lb.cy})`"
            style="pointer-events:none">
            <!-- 红星：在文字左侧，星右端 = -halfW-3 -->
            <polygon :points="starPts(-lb.hw - 9, 0, 6, 2.6)" fill="#C0281C"/>
            <!-- 街道名：从 -halfW+1 开始，居左，这样整体对齐中心 -->
            <text
              :x="-lb.hw + 1" y="0"
              text-anchor="start"
              dominant-baseline="middle"
              font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif"
              :font-size="lb.fs || 13"
              font-weight="700"
              fill="#1a0a06"
            >{{ lb.name }}</text>
          </g>

          <!-- 指南针（左侧中偏下，对应原图位置） -->
          <circle cx="72" cy="760" r="36" fill="#F5EFD6" stroke="#C8A84B" stroke-width="1.5"/>
          <circle cx="72" cy="760" r="31" fill="none" stroke="#C8A84B" stroke-width="0.6" stroke-dasharray="3 2.5"/>
          <polygon points="72,732 76,757 72,761 68,757" fill="#C0281C"/>
          <polygon points="72,788 76,763 72,761 68,763" fill="#9A7B2C"/>
          <circle cx="72" cy="760" r="3" fill="#fff" stroke="#C8A84B" stroke-width="1"/>
          <text x="72" y="724" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#C0281C" font-weight="800" font-family="Arial,sans-serif">N</text>
          <text x="72" y="796" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#4A3020" font-weight="700" font-family="Arial,sans-serif">S</text>
          <text x="40"  y="760" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#4A3020" font-weight="700" font-family="Arial,sans-serif">W</text>
          <text x="104" y="760" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#4A3020" font-weight="700" font-family="Arial,sans-serif">E</text>

          <!-- 图注（左下角） -->
          <rect x="18" y="828" width="160" height="46" rx="6" fill="#F5EFD6" stroke="#C8A84B" stroke-width="1.2"/>
          <text x="30" y="845" dominant-baseline="middle" font-size="13" fill="#4A3020" font-weight="700" font-family="-apple-system,'PingFang SC',sans-serif">图注</text>
          <polygon :points="starPts(30, 864, 7, 3)" fill="#C0281C"/>
          <text x="42" y="864" dominant-baseline="middle" font-size="11.5" fill="#2A1A0E" font-weight="500" font-family="-apple-system,'PingFang SC',sans-serif">街镇级党群服务中心</text>

        </svg>
      </div>
    </div>
  </div>

  <!-- 弹窗 -->
  <div class="overlay" v-if="active" @click.self="close">
    <div class="card">
      <div class="card-header">
        <div class="card-badge">★ 街镇级党群服务中心</div>
        <div class="card-name">{{ active.name }}</div>
        <button class="card-close" @click="close">✕</button>
      </div>
      <div class="card-body">
        <div class="info-row">
          <div class="info-icon-wrap">📍</div>
          <div class="info-content">
            <div class="info-label">服务地址</div>
            <div class="info-value">{{ active.address }}</div>
          </div>
        </div>
        <div class="info-row">
          <div class="info-icon-wrap">🕐</div>
          <div class="info-content">
            <div class="info-label">营业时间</div>
            <div class="info-value">{{ active.hours }}</div>
          </div>
        </div>
        <div class="info-row">
          <div class="info-icon-wrap">👤</div>
          <div class="info-content">
            <div class="info-label">负责人</div>
            <div class="info-value">{{ active.contact }}</div>
          </div>
        </div>
        <div class="info-row">
          <div class="info-icon-wrap">📞</div>
          <div class="info-content">
            <div class="info-label">联系电话</div>
            <div class="info-value phone">{{ active.phone || '暂无' }}</div>
          </div>
        </div>
      </div>
      <div class="card-footer">
        <button class="btn-call" @click="call(active.phone)">📞 拨打电话</button>
      </div>
    </div>
  </div>
</div>

    starPts(cx,cy,r1,r2){
      const p=[];
      for(let i=0;i<10;i++){
        const r=i%2===0?r1:r2;
        const a=(i*36-90)*Math.PI/180;
        p.push(`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`);
      }
      return p.join(' ');
